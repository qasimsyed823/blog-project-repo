{% extends "blog/base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-sm">
            <div class="card-body">

                <h3 class="mb-4">Login</h3>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        {{ form.username.label_tag }}
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        {{ form.password.label_tag }}
                        {{ form.password }}
                    </div>

                    <button type="submit" class="btn btn-primary">Login</button>

                    <a href="{% url 'register' %}" class="btn btn-secondary ms-2">
                        New user? Sign Up
                    </a>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
