<!DOCTYPE html>
<html>
<head>
    <title>BlogSite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'post_list' %}">
            BlogSite
        </a>

        <div class="d-flex align-items-center">

            {% if user.is_authenticated %}
                <span class="text-white me-3">
                    Hello {{ user.username }}
                </span>

                <a href="{% url 'create_post' %}" class="btn btn-outline-light btn-sm me-2">
                    New Post
                </a>

                <form method="post" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-light btn-sm">
                        Logout
                    </button>
                </form>

            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">
                    Login
                </a>

                <a href="{% url 'register' %}" class="btn btn-light btn-sm">
                    Register
                </a>
            {% endif %}

        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
